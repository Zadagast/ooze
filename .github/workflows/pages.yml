# Deploy the project website (site/) to GitHub Pages.
#
# Requires Pages enabled with Source: "GitHub Actions"
# (Settings → Pages, or: gh api --method POST repos/OWNER/REPO/pages
#  -f build_type=workflow -f source[branch]=main -f source[path]=/).
# configure-pages enablement cannot use GITHUB_TOKEN alone.

name: Deploy website

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4

