# Advertise a global menubar so appmenu-gtk-module hides in-window bars
# (Inkscape / GTK3 on Xwayland).
Gtk/ShellShowsMenubar 1
Gtk/ShellShowsAppmenu 1

# Left-side window controls (match Ooze / Aqua traffic-light side).
Gtk/DecorationLayout "close,minimize,maximize:"

# Live ThemeName mirrors org.gnome.desktop.interface gtk-theme (usually Adwaita).
# Foreign apps may still get GTK_THEME=WhiteSur-* at launch time only.
# Gtk/ThemeName "Adwaita"
